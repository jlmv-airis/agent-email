<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agente de Email AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Agente <span class="text-indigo-500">Email AI</span></h1>
            <p class="text-slate-400 mt-2 text-sm">Ingresa tus credenciales para acceder al panel</p>
        </div>

        <form id="login-form" class="bg-white p-8 rounded-3xl shadow-2xl space-y-6">
            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-2">Usuario</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                    placeholder="admin">
            </div>

            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-2">Contraseña</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                    placeholder="••••••••">
            </div>

            <div id="error-message" class="hidden text-red-500 text-xs font-bold text-center">
                <!-- Se llena dinámicamente -->
            </div>

            <button type="submit" id="btn-login"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-500/30 transition-all transform hover:-translate-y-1">
                ENTRAR AL SISTEMA
            </button>
        </form>

        <p class="text-center text-slate-500 text-[10px] mt-8 uppercase font-bold tracking-widest">
            Acceso restringido • v0.0.4
        </p>
    </div>

    <script>
        const N8N_URL_1 = 'http://127.0.0.1:5678';
        const N8N_URL_2 = 'http://localhost:5678';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const btn = document.getElementById('btn-login');

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerText = 'VERIFICANDO...';

            async function tryLogin(baseUrl) {
                const url = `${baseUrl}/webhook/auth/v32/login`;
                console.log('Intentando:', url);
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const text = await response.text();
                console.log('Respuesta cruda de n8n:', text);

                if (!text) {
                    throw new Error("El servidor n8n devolvió una respuesta vacía. Verifica que el flujo esté activo y los nodos conectados.");
                }

                try {
                    return JSON.parse(text);
                } catch (e) {
                    throw new Error("La respuesta de n8n no es un JSON válido: " + text.substring(0, 100));
                }
            }

            try {
                let data;
                try {
                    data = await tryLogin(N8N_URL_1);
                } catch (e) {
                    console.warn('Fallo localhost, reintentando con IP...');
                    data = await tryLogin(N8N_URL_2);
                }

                if (data.status === 'success') {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userData', JSON.stringify(data.user));
                    console.log('Login exitoso, redirigiendo...');
                    window.location.replace('Panel.html');
                } else {
                    errorMsg.innerText = data.message || 'Credenciales incorrectas';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error Login:', error);
                errorMsg.innerText = 'Error de conexión con el servidor (n8n). Asegúrate de que n8n esté activo.';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = 'ENTRAR AL SISTEMA';
            }
        });
    </script>
</body>
</html>
