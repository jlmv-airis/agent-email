<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agente de Email AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Agente <span class="text-indigo-500">Email AI</span></h1>
            <p class="text-slate-400 mt-2 text-sm">Ingresa tus credenciales para acceder al panel</p>
        </div>

        <form id="login-form" class="bg-white p-8 rounded-3xl shadow-2xl space-y-6">
            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-2">Usuario</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                    placeholder="admin">
            </div>

            <div>
                <label class="block text-xs font-black uppercase text-slate-500 mb-2">Contraseña</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                    placeholder="••••••••">
            </div>

            <div id="error-message" class="hidden text-red-500 text-xs font-bold text-center">
                Credenciales incorrectas. Inténtalo de nuevo.
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-500/30 transition-all transform hover:-translate-y-1">
                ENTRAR AL SISTEMA
            </button>
        </form>

        <p class="text-center text-slate-500 text-[10px] mt-8 uppercase font-bold tracking-widest">
            Acceso restringido • v0.0.4
        </p>
    </div>

    <script>
        const N8N_URL = 'http://localhost:5678';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            try {
                const response = await fetch(`${N8N_URL}/webhook/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userData', JSON.stringify(data.user));
                    window.location.href = 'Panel.html';
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudo conectar con el servidor de autenticación (n8n).');
            }
        });
    </script>
</body>
</html>
