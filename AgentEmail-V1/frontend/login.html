<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Email AIRIS - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --apple-bg: #f5f5f7; --apple-white: #ffffff; --apple-blue: #007aff; 
            --apple-text: #1d1d1f; --apple-border: rgba(0,0,0,0.08);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--apple-bg); }
        .login-card { 
            width: 400px; background: var(--apple-white); border-radius: 32px; padding: 48px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid var(--apple-border);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="login-card">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-extrabold tracking-tighter italic">Agent Email <span style="color:var(--apple-blue)">AIRIS</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-2">Acceso al Command Center</p>
        </div>
        <form id="login-form" class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Email Corporativo</label>
                <input type="email" id="login-email" required class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Contraseña</label>
                <input type="password" id="login-password" required class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <p id="caps-lock-warning" class="hidden text-amber-600 text-[10px] font-bold mt-2 flex items-center gap-1">
                    <span>⚠️</span> BLOQUEO DE MAYÚSCULAS ACTIVADO
                </p>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-[0.98]">
                Iniciar Sesión
            </button>
        </form>
        <p id="login-error" class="text-red-500 text-[11px] font-bold mt-4 text-center hidden"></p>
    </div>

    <script>
        const API_URL = '/api';
        
        // Detección de Bloqueo de Mayúsculas
        const passwordInput = document.getElementById('login-password');
        const capsWarning = document.getElementById('caps-lock-warning');

        passwordInput.addEventListener('keyup', (e) => {
            if (e.getModifierState('CapsLock')) {
                capsWarning.classList.remove('hidden');
            } else {
                capsWarning.classList.add('hidden');
            }
        });

        // Asegurar que se oculte si se sale del campo
        passwordInput.addEventListener('blur', () => capsWarning.classList.add('hidden'));

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            
            try {
                const res = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Error al iniciar sesión');
                }
                
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.replace('index.html');
            } catch(e) {
                errorEl.textContent = e.message;
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
