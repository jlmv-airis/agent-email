<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Email AIRIS - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* --- COLORES PRIMARIOS --- */
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-dark: #2563eb;
            
            /* --- COLORES DE ESTADO --- */
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            
            /* --- ESPACIADO --- */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            
            /* --- TIPOGRAFÍA --- */
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            
            /* --- BORDER RADIUS --- */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
            
            /* --- SOMBRAS --- */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0,0,0,0.25);
            
            /* --- TEMA OSCURO (Default) --- */
            --bg-primary: #0f1117;
            --bg-card: rgba(18, 20, 24, 0.85);
            --text-primary: #e1e1e6;
            --text-secondary: #9ba1a6;
            --border-color: rgba(255,255,255,0.06);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* ============================================
           FONDOS ANIMADOS
           ============================================ */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 100% 80% at 50% -30%, rgba(59, 130, 246, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 80% 60% at 100% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 0% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            animation: gradientShift 20s ease-in-out infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            animation: glowPulse 8s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }
        
        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        
        /* ============================================
           LOGIN CARD
           ============================================ */
        .login-card { 
            width: 420px;
            background: var(--bg-card);
            border-radius: var(--radius-2xl);
            padding: var(--space-8) var(--space-8);
            position: relative;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-2xl), 0 0 0 1px rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        
        /* ============================================
           LOGO Y TÍTULO
           ============================================ */
        .logo {
            text-align: center;
            margin-bottom: var(--space-8);
            animation: fadeIn 0.8s ease-out 0.1s both;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: var(--space-2);
            line-height: 1.2;
        }
        
        .logo-main {
            color: var(--text-primary);
        }
        
        .logo-accent {
            color: var(--primary);
        }
        
        .logo p {
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        
        /* ============================================
           FORMULARIO
           ============================================ */
        .form-group {
            margin-bottom: var(--space-5);
            animation: fadeIn 0.8s ease-out 0.2s both;
        }
        
        .form-group:nth-child(2) {
            animation-delay: 0.3s;
        }
        
        .form-group:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        .form-label {
            display: block;
            font-size: var(--text-xs);
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: var(--space-3);
        }
        
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-sm);
            font-weight: 400;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }
        
        .form-input:focus {
            background: rgba(255,255,255,0.05);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .form-input:not(:placeholder-shown) {
            border-color: rgba(255,255,255,0.1);
        }
        
        /* ============================================
           BOTÓN SUBMIT
           ============================================ */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: white;
            font-size: var(--text-sm);
            font-weight: 600;
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: var(--space-3);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        
        .submit-btn:hover {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        
        .submit-btn:hover::before {
            transform: translateX(100%);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .submit-btn.loading {
            color: transparent;
        }

        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }
        
        /* ============================================
           MENSAJES DE ERROR
           ============================================ */
        .error-message {
            font-size: var(--text-xs);
            font-weight: 500;
            color: var(--error);
            text-align: center;
            padding: var(--space-3);
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: var(--radius-md);
            margin-top: var(--space-4);
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        
        .error-message.visible {
            display: block;
            animation: shake 0.4s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        
        /* ============================================
           SPINNER
           ============================================ */
        .spinner {
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            display: none;
            animation: btn-spin 0.8s linear infinite;
        }
        
        .submit-btn.loading .spinner {
            display: block;
        }
        
        /* ============================================
           DIVIDER
           ============================================ */
        .divider {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin: var(--space-6) 0;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
        }
        
        .divider span {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        
        .hidden {
            display: none;
        }
        
        /* ============================================
           CAPS LOCK WARNING
           ============================================ */
        .caps-warning {
            font-size: var(--text-xs);
            font-weight: 500;
            color: var(--warning);
            margin-top: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .caps-warning.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- FONDOS ANIMADOS -->
    <div class="bg-gradient"></div>
    <div class="bg-glow"></div>
    <div class="noise"></div>
    
    <!-- LOGIN CARD -->
    <div class="login-card">
        <div class="logo">
            <h1>
                <span class="logo-main">Agent Email</span>
                <span class="logo-accent">AIRIS</span>
            </h1>
            <p>Command Center</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="login-email" required class="form-input" placeholder="correo@empresa.com" autocomplete="email">
            </div>
            
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="login-password" required class="form-input" placeholder="••••••••" autocomplete="current-password">
                <div id="caps-lock-warning" class="caps-warning">
                    <span>⚠</span>
                    <span>Bloq. Mayúsculas activo</span>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="btn-text">Iniciar Sesión</span>
                <span class="spinner"></span>
            </button>
        </form>
        
        <p id="login-error" class="error-message"></p>
    </div>

    <script>
        const API_URL = '/api';
        
        // ============================================
        // LOGIN FUNCTIONALITY
        // ============================================
        const passwordInput = document.getElementById('login-password');
        const capsWarning = document.getElementById('caps-lock-warning');
        
        passwordInput.addEventListener('keyup', (e) => {
            capsWarning.classList.toggle('visible', e.getModifierState('CapsLock'));
        });
        
        passwordInput.addEventListener('blur', () => {
            capsWarning.classList.remove('visible');
        });
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('submit-btn');
            
            errorEl.classList.remove('visible');
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                const res = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Error al iniciar sesión');
                }
                
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.replace('index.html');
            } catch(e) {
                btn.classList.remove('loading');
                btn.disabled = false;
                errorEl.textContent = e.message;
                errorEl.classList.add('visible');
            }
        });
    </script>
</body>
</html>
