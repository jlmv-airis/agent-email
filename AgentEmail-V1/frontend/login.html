<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Email AIRIS - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0c0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 100% 80% at 50% -30%, rgba(59, 130, 246, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 80% 60% at 100% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 0% 80%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            animation: gradientShift 20s ease-in-out infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            animation: glowPulse 8s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }
        
        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        
        .login-card { 
            width: 380px;
            background: rgba(18, 18, 24, 0.85);
            border-radius: 24px;
            padding: 48px 40px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 10px 40px -10px rgba(59, 130, 246, 0.15);
            backdrop-filter: blur(20px);
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out 0.1s both;
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        
        .logo-main {
            color: #e2e8f0;
        }
        
        .logo-accent {
            color: #3b82f6;
        }
        
        .logo p {
            font-size: 11px;
            font-weight: 500;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        
        .form-group {
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }
        
        .form-group:nth-child(2) {
            animation-delay: 0.3s;
        }
        
        .form-group:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }
        
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 400;
            color: #f1f5f9;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-input::placeholder {
            color: #475569;
        }
        
        .form-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .form-input:not(:placeholder-shown) {
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .caps-warning {
            font-size: 11px;
            font-weight: 500;
            color: #f59e0b;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .caps-warning.visible {
            opacity: 1;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        
        .submit-btn:hover {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        
        .submit-btn:hover::before {
            transform: translateX(100%);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .error-message {
            font-size: 12px;
            font-weight: 500;
            color: #ef4444;
            text-align: center;
            padding: 12px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 10px;
            margin-top: 16px;
            display: none;
        }
        
        .error-message.visible {
            display: block;
            animation: shake 0.4s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .submit-btn.loading .spinner {
            display: inline-block;
        }
        
        .submit-btn.loading .btn-text {
            opacity: 0.7;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }
        
        .divider span {
            font-size: 10px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-glow"></div>
    <div class="noise"></div>
    
    <div class="login-card">
        <div class="logo">
            <h1>
                <span class="logo-main">Agent Email</span>
                <span class="logo-accent">AIRIS</span>
            </h1>
            <p>Command Center</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="login-email" required class="form-input" placeholder="correo@empresa.com" autocomplete="email">
            </div>
            
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="login-password" required class="form-input" placeholder="••••••••" autocomplete="current-password">
                <div id="caps-lock-warning" class="caps-warning">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l.442.88c.944 1.89.524 4.166.393 4.472l.442 1.03c.548 1.274-.548 2.645-1.853 2.204l-1.03-.442c-.306-.132-2.582-.55-4.472-.393l-.44.442c-.76 1.514-2.534 1.095-2.904-.687L.643 7.49c-.37-1.05.493-2.195 1.853-2.204l1.03-.442c.306-.132 2.582.55 4.472.393l.441-.442-.001-.001zM12 14a1 1 0 11-2 0 1 1 0 012 0zm-1-6a2 2 0 100 4 2 2 0 000-4z" clip-rule="evenodd"/></svg>
                    Bloq. Mayúsculas
                </div>
            </div>
            
            <button type="submit" class="submit-btn">
                <span class="btn-text">Iniciar Sesión</span>
                <span class="spinner"></span>
            </button>
        </form>
        
        <p id="login-error" class="error-message"></p>
    </div>

    <script>
        const API_URL = '/api';
        
        const passwordInput = document.getElementById('login-password');
        const capsWarning = document.getElementById('caps-lock-warning');
        
        passwordInput.addEventListener('keyup', (e) => {
            capsWarning.classList.toggle('visible', e.getModifierState('CapsLock'));
        });
        
        passwordInput.addEventListener('blur', () => {
            capsWarning.classList.remove('visible');
        });
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const btn = e.target.querySelector('.submit-btn');
            
            errorEl.classList.remove('visible');
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                const res = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Error al iniciar sesión');
                }
                
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.replace('index.html');
            } catch(e) {
                btn.classList.remove('loading');
                btn.disabled = false;
                errorEl.textContent = e.message;
                errorEl.classList.add('visible');
            }
        });
    </script>
</body>
</html>
